# -----------------------------------------------------------------------------
# Release pipeline
#
# 1) Push to main (non-bot, not [skip release]): compute next semver from
#    conventional commits (scripts/next-release-version.sh, docs/breaking-changes.md),
#    push tag v*.*.*. Requires secret RELEASE_PLEASE_TOKEN (PAT) so the tag push
#    triggers the publish jobs (GITHUB_TOKEN pushes do not trigger workflows).
#
# 2) Push tag v*.*.* or workflow_dispatch: build binaries, Docker image (linux/amd64),
#    bump iota-deployments, sync .release-please-manifest.json on main.
#
# Docker: tags are derived from RELEASE_TAG (vX.Y.Z, X.Y.Z, X.Y, X, latest). On workflow_dispatch,
# github.ref stays refs/heads/main, so docker/metadata semver-only tags would only publish :latest.
#
# Local: ./scripts/next-release-version.sh && git tag … && git push origin <tag>
# -----------------------------------------------------------------------------

name: Release pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- Push to main → next version tag (PAT required) ---
  tag-next-release:
    name: Tag next release from main
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip release]')
    runs-on: [self-hosted, beelink]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: next
        run: ./scripts/next-release-version.sh --github-out

      - name: Push annotated tag
        if: steps.next.outputs.should_release == 'true'
        env:
          TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::Set RELEASE_PLEASE_TOKEN (PAT with contents: write) so tag pushes trigger publish jobs."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "::notice::Tag ${TAG} already exists; skipping."
            exit 0
          fi
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

  # --- Binaries (parallel with Docker) ---
  # Stay on GitHub-hosted: native linux/arm64 job needs a real ARM runner for CGO (Beelink is amd64-only).
  build-binary:
    name: Build binary (${{ matrix.suffix }})
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            suffix: linux-amd64
          - runner: ubuntu-24.04-arm
            suffix: linux-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install build dependencies
        run: ./scripts/ensure-apt-packages.sh gcc g++ libc6-dev libsqlite3-dev

      - name: Build
        run: CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" -o "iota-${{ matrix.suffix }}" ./cmd/iota

      - uses: actions/upload-artifact@v4
        with:
          name: iota-${{ matrix.suffix }}
          path: iota-${{ matrix.suffix }}

  # --- linux/amd64 only: avoids QEMU arm64 builds on the self-hosted x64 runner (heavy CPU).
  #    Release binaries for arm64 remain in build-binary (native ubuntu-24.04-arm) if needed.
  docker-publish:
    name: Docker push (linux/amd64)
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, beelink]
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # RELEASE_TAG matches the git tag (e.g. v0.7.1). workflow_dispatch leaves github.ref as main,
      # so semver-based metadata tags would not run — compute variants explicitly.
      - name: Docker tag variants from release
        id: dockertags
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::RELEASE_TAG must look like v0.7.1, got: ${RELEASE_TAG}"
            exit 1
          fi
          plain="${RELEASE_TAG#v}"
          mm="${plain%.*}"
          m="${plain%%.*}"
          echo "with_v=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "no_v=${plain}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${mm}" >> "$GITHUB_OUTPUT"
          echo "major=${m}" >> "$GITHUB_OUTPUT"

      # Docker Hub image (bilals12); GitHub org (iota-corp) is unrelated to docker.io namespaces.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: bilals12/iota
          tags: |
            type=raw,value=${{ steps.dockertags.outputs.with_v }}
            type=raw,value=${{ steps.dockertags.outputs.no_v }}
            type=raw,value=${{ steps.dockertags.outputs.major_minor }}
            type=raw,value=${{ steps.dockertags.outputs.major }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  bump-iota-deployments:
    name: Bump image tag in iota-deployments
    needs: [docker-publish]
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, beelink]
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Decide whether to bump iota-deployments
        id: bump
        env:
          PAT: ${{ secrets.IOTA_DEPLOYMENTS_TOKEN }}
        run: |
          if [ -z "${PAT:-}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Set repository secret IOTA_DEPLOYMENTS_TOKEN on GitHub (iota-corp/iota) to auto-bump iota-corp/iota-deployments on each release tag."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.bump.outputs.run == 'true'
        with:
          repository: iota-corp/iota-deployments
          token: ${{ secrets.IOTA_DEPLOYMENTS_TOKEN }}
          ref: main

      - name: Update kustomize image tags and push
        if: steps.bump.outputs.run == 'true'
        run: |
          set -euo pipefail
          for f in clusters/homelab/kustomization.yaml clusters/eks-lab/kustomization.yaml; do
            sed -i "s/^\([[:space:]]*newTag:[[:space:]]*\).*/\1${RELEASE_TAG}/" "$f"
          done
          git diff --stat
          if git diff --quiet; then
            echo "Image tags already at ${RELEASE_TAG}; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clusters/homelab/kustomization.yaml clusters/eks-lab/kustomization.yaml
          git commit -m "ops: bump iota image to ${RELEASE_TAG}"
          git push origin main

  attach-binaries:
    name: Attach binaries to GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, beelink]
    needs: [build-binary]
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Ensure GitHub CLI
        run: |
          command -v gh >/dev/null 2>&1 && exit 0
          if sudo -n true 2>/dev/null; then
            sudo apt-get update && sudo apt-get install -y gh
          else
            echo "::error::Install gh on the self-hosted runner: sudo apt-get install -y gh"
            exit 1
          fi

      # Pattern must not be `iota-*`: Docker/GHA cache artifacts like `iota-corp~repo~….dockerbuild`
      # also match and break download/extract (binary-only job).
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: iota-linux-*
          merge-multiple: true
          path: release-assets

      - name: Make binaries executable
        run: chmod +x release-assets/iota-*

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              release-assets/iota-linux-amd64 \
              release-assets/iota-linux-arm64 \
              --clobber
          else
            gh release create "$TAG" \
              release-assets/iota-linux-amd64 \
              release-assets/iota-linux-arm64 \
              --generate-notes \
              --title "$TAG"
          fi

  # Keep manifest on main aligned with the latest tag (bot push; tag job ignores bot actor)
  sync-manifest:
    name: Sync version manifest on main
    needs: [docker-publish]
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, beelink]
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Ensure jq
        run: |
          command -v jq >/dev/null 2>&1 && exit 0
          if sudo -n true 2>/dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          else
            echo "::error::Install jq on the self-hosted runner: sudo apt-get install -y jq"
            exit 1
          fi

      - name: Skip if no PAT
        id: tok
        env:
          TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "${TOKEN:-}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RELEASE_PLEASE_TOKEN unset; skipping manifest sync."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.tok.outputs.run == 'true'
        with:
          ref: main
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          fetch-depth: 0

      - name: Update .release-please-manifest.json
        if: steps.tok.outputs.run == 'true'
        env:
          TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          VERSION_STRIP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          V="${VERSION_STRIP#v}"
          jq --arg v "$V" '.["."] = $v' .release-please-manifest.json > .release-please-manifest.json.tmp
          mv .release-please-manifest.json.tmp .release-please-manifest.json
          git diff --stat
          if git diff --quiet; then
            echo "Manifest already at ${V}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .release-please-manifest.json
          git commit -m "build: sync manifest to ${V} [skip release]"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin main
