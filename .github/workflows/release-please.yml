# Opens/updates a release PR from conventional commits on main. When that PR is merged,
# Release Please creates the tag + GitHub Release (changelog). Tag push runs release.yml (binaries + Docker).

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Requires repo setting: Settings → Actions → General →
      # "Read and write permissions" + "Allow GitHub Actions to create and approve pull requests".
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
