# Manual check that org self-hosted runners are online and labeled correctly.
# Actions → Self-hosted runner smoke → Run workflow.
#
# Pools:
#   - beelink: self-hosted, beelink (x64 Linux on homelab)
#   - homelab-arc-arm: self-hosted, homelab-arc-arm, Linux, ARM64 (ARC on k3d / spare Mac)

name: Self-hosted runner smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.pool }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - pool: beelink
            runs_on: '["self-hosted","beelink"]'
          - pool: homelab-arc-arm
            runs_on: '["self-hosted","homelab-arc-arm","Linux","ARM64"]'
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    steps:
      - uses: actions/checkout@v4

      - name: Host and runner
        run: |
          uname -a
          echo "RUNNER_NAME=$RUNNER_NAME"
          echo "RUNNER_OS=$RUNNER_OS"

      - name: Docker (ARC pool has DinD sidecar)
        if: matrix.pool == 'homelab-arc-arm'
        run: docker version

      - name: Toolchain probe (optional during bring-up)
        run: |
          command -v go >/dev/null 2>&1 && go version || echo "go: not installed yet (OK for smoke)"
