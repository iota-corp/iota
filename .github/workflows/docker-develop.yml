# -----------------------------------------------------------------------------
# Pre-release Docker images for the develop integration branch.
#
# Pushes bilals12/iota:develop (floating) and bilals12/iota:sha-<short> (immutable)
# on every push to develop. iota-deployments / Argo should pin bilals12/iota:sha-<7>
# (never :develop) so the cluster matches a known iota commit.
#
# Runs on self-hosted ARC (homelab-arc-arm); image is still linux/amd64 (EKS/homelab nodes).
# Release images (semver, latest, iota-deployments bump) remain on release.yml + v*.*.* tags.
# -----------------------------------------------------------------------------

name: Docker (develop)

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-develop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push:
    name: Build and push linux/amd64
    runs-on: ${{ fromJSON('["self-hosted","homelab-arc-arm","Linux","ARM64"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA for immutable tag
        id: sha
        run: echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # Avoid failed pulls of moby/buildkit when ~/.docker has bad docker.io credentials.
      - name: Log out of Docker Hub (anonymous pull for base images)
        run: docker logout docker.io 2>/dev/null || true

      - uses: docker/setup-buildx-action@v3
        with:
          version: v0.33.0
          driver: docker

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          network: host
          tags: |
            bilals12/iota:develop
            bilals12/iota:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
