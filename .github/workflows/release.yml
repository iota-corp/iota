# Tag push v*.*.* → Linux binaries on GitHub Release + Docker Hub (multi-arch).
# Tags are created by merging a Release Please release PR (usual) or by manual `git tag`.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-binary:
    name: Build binary (${{ matrix.suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            suffix: linux-amd64
          - runner: ubuntu-24.04-arm
            suffix: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ libc6-dev libsqlite3-dev

      - name: Build
        run: CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" -o "iota-${{ matrix.suffix }}" ./cmd/iota

      - uses: actions/upload-artifact@v4
        with:
          name: iota-${{ matrix.suffix }}
          path: iota-${{ matrix.suffix }}

  build-amd64:
    name: Docker image linux/amd64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and push AMD64 image
        id: build-amd64
        uses: open-turo/actions-docker/build@v1
        with:
          dockerhub-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_PASSWORD }}
          image-platform: linux/amd64
          push: true
          metadata-tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

    outputs:
      digest: ${{ steps.build-amd64.outputs.digest }}
      image-name: ${{ steps.build-amd64.outputs.image-name }}

  build-arm64:
    name: Docker image linux/arm64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and push ARM64 image
        id: build-arm64
        uses: open-turo/actions-docker/build@v1
        with:
          dockerhub-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_PASSWORD }}
          image-platform: linux/arm64
          install-qemu: true
          push: true
          metadata-tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

    outputs:
      digest: ${{ steps.build-arm64.outputs.digest }}
      image-name: ${{ steps.build-arm64.outputs.image-name }}

  create-manifest:
    name: Docker multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Create multi-arch manifest
        id: manifest
        uses: open-turo/actions-docker/manifest@v1
        with:
          image-name: bilals12/iota
          dockerhub-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_PASSWORD }}
          metadata-tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          sources: |
            bilals12/iota@${{ needs.build-amd64.outputs.digest }}
            bilals12/iota@${{ needs.build-arm64.outputs.digest }}

  github-release:
    name: GitHub Release assets
    runs-on: ubuntu-latest
    needs: [build-binary]

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: iota-*
          merge-multiple: true
          path: release-assets

      - name: Make binaries executable
        run: chmod +x release-assets/iota-*

      - name: Attach binaries to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job has no checkout; gh otherwise infers repo from git and fails.
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              release-assets/iota-linux-amd64 \
              release-assets/iota-linux-arm64 \
              --clobber
          else
            gh release create "$TAG" \
              release-assets/iota-linux-amd64 \
              release-assets/iota-linux-arm64 \
              --generate-notes \
              --title "$TAG"
          fi
