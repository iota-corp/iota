name: CI

# Fork PRs use ubuntu-latest so untrusted code never runs on self-hosted runners.
# Same-repo PRs and all pushes use the org runner (beelink).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && 'ubuntu-latest' || fromJSON('["self-hosted","beelink"]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install CGO build dependencies
        run: ./scripts/ensure-apt-packages.sh gcc libc6-dev libsqlite3-dev

      - name: Run unit tests
        env:
          CGO_ENABLED: "1"
        run: go test -v ./...

      - name: Smoke test (binary + once mode + Python engine)
        env:
          CGO_ENABLED: "1"
        run: ./scripts/smoke.sh

      - name: Run linter
        uses: golangci/golangci-lint-action@v4
        env:
          CGO_ENABLED: "1"
        with:
          version: latest

  build:
    name: Build
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && 'ubuntu-latest' || fromJSON('["self-hosted","beelink"]') }}
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install CGO build dependencies
        run: ./scripts/ensure-apt-packages.sh gcc libc6-dev libsqlite3-dev

      - name: Build binary
        env:
          CGO_ENABLED: "1"
        run: go build -o bin/iota ./cmd/iota

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iota-binary
          path: bin/iota
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && 'ubuntu-latest' || fromJSON('["self-hosted","beelink"]') }}
    needs: test
    steps:
      - uses: actions/checkout@v4

      # Avoid failed pulls of moby/buildkit when ~/.docker has bad docker.io credentials.
      - name: Log out of Docker Hub (use anonymous pull for public images)
        run: docker logout docker.io 2>/dev/null || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use engine BuildKit instead of pulling moby/buildkit:buildx-stable-1 (often hits bad auth).
          driver: docker

      # GHA cache-to type=gha requires the docker-container driver; we use `driver: docker` (see above).
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: iota:test
