name: CI

# Fork PRs use ubuntu-latest so untrusted code never runs on self-hosted runners.
# Same-repo PRs and pushes use ARC on the spare Mac (homelab-arc-arm); beelink remains for
# release workflows and smoke matrix until you retire it.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && 'ubuntu-latest' || fromJSON('["self-hosted","homelab-arc-arm","Linux","ARM64"]') }}
    env:
      # Outside $GITHUB_WORKSPACE so actions/checkout can wipe the clone; smoke.sh defaults would use repo-local caches.
      GOMODCACHE: ${{ github.workspace }}/../.gomodcache
      GOCACHE: ${{ github.workspace }}/../.gocache
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/../.gomodcache
          key: ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install CGO build dependencies
        # go-duckdb links with -lstdc++ (g++ metapackage on Debian/Ubuntu).
        run: ./scripts/ensure-apt-packages.sh gcc g++ libc6-dev libsqlite3-dev

      - name: Run unit tests
        env:
          CGO_ENABLED: "1"
        run: go test -v ./...

      - name: Smoke test (binary + once mode + Python engine)
        env:
          CGO_ENABLED: "1"
        run: ./scripts/smoke.sh

      # Go 1.25 requires golangci-lint v2.4.0+ (v1.x binaries are built with Go 1.24).
      # golangci-lint-action v6 only supports golangci-lint v1; v2 needs action v7+.
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        env:
          CGO_ENABLED: "1"
        with:
          version: v2.11.4

  build:
    name: Build
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && 'ubuntu-latest' || fromJSON('["self-hosted","homelab-arc-arm","Linux","ARM64"]') }}
    needs: test
    env:
      GOMODCACHE: ${{ github.workspace }}/../.gomodcache
      GOCACHE: ${{ github.workspace }}/../.gocache
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install CGO build dependencies
        run: ./scripts/ensure-apt-packages.sh gcc g++ libc6-dev libsqlite3-dev

      - name: Build binary
        env:
          CGO_ENABLED: "1"
        run: go build -o bin/iota ./cmd/iota

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iota-binary
          path: bin/iota
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) && 'ubuntu-latest' || fromJSON('["self-hosted","homelab-arc-arm","Linux","ARM64"]') }}
    needs: test
    env:
      GOMODCACHE: ${{ github.workspace }}/../.gomodcache
      GOCACHE: ${{ github.workspace }}/../.gocache
    steps:
      - uses: actions/checkout@v4

      # Avoid failed pulls of moby/buildkit when ~/.docker has bad docker.io credentials.
      - name: Log out of Docker Hub (use anonymous pull for public images)
        run: docker logout docker.io 2>/dev/null || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use engine BuildKit instead of pulling moby/buildkit:buildx-stable-1 (often hits bad auth).
          driver: docker

      # GHA cache: persist BuildKit layers between CI runs. host network avoids bridge/MTU issues to debian mirrors in DinD.
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          network: host
          tags: iota:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
